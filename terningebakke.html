<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Terningebakke — D&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14121A;
    --bg2:#1A1722;
    --tray:#211C2C;
    --tray-edge:#322a44;
    --bone:#E8E2D4;
    --muted:#8B8398;
    --gold:#D4A24E;
    --gold-hi:#F0CB7A;
    --crimson:#C8413B;
    --emerald:#5FA882;
    --indigo:#6C5CB5;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--bone);font-family:'Sora',sans-serif}
  body{
    min-height:100dvh;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(108,92,181,.18), transparent 60%),
      radial-gradient(90% 60% at 50% 110%, rgba(212,162,78,.06), transparent 60%),
      var(--bg);
    padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 28px);
    display:flex;flex-direction:column;align-items:center;
  }
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:18px}

  /* header */
  header{text-align:center;margin-bottom:2px}
  .title{
    font-family:'Cinzel',serif;font-weight:700;letter-spacing:.14em;
    font-size:1.55rem;color:var(--bone);
  }
  .title b{color:var(--gold)}
  .subtitle{color:var(--muted);font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;margin-top:5px}

  /* result hero */
  .stage{
    position:relative;border-radius:22px;overflow:hidden;
    background:linear-gradient(180deg,#1c1828,#16131e);
    border:1px solid var(--tray-edge);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 24px 50px -28px rgba(0,0,0,.9);
    min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:26px 18px;text-align:center;transition:box-shadow .4s, border-color .4s;
  }
  .stage.crit{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold), 0 0 60px -10px rgba(240,203,122,.5)}
  .stage.fumble{border-color:var(--crimson);box-shadow:inset 0 0 0 1px var(--crimson), 0 0 60px -14px rgba(200,65,59,.45)}

  .stage-empty{color:var(--muted);font-size:.95rem;max-width:240px;line-height:1.5}
  .stage-empty .glyph{font-size:1.8rem;opacity:.5;display:block;margin-bottom:10px}

  .verdict{
    font-family:'Cinzel',serif;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
    font-size:.72rem;height:.9rem;margin-bottom:8px;color:var(--muted);transition:color .3s
  }
  .verdict.crit{color:var(--gold-hi)}
  .verdict.fumble{color:var(--crimson)}

  .total{
    font-family:'Cinzel',serif;font-weight:700;line-height:1;
    font-size:5.2rem;color:var(--bone);font-variant-numeric:tabular-nums;
    text-shadow:0 4px 30px rgba(0,0,0,.6);
  }
  .stage.crit .total{color:var(--gold-hi);text-shadow:0 0 34px rgba(240,203,122,.6)}
  .stage.fumble .total{color:var(--crimson)}

  .breakdown{
    margin-top:12px;font-family:'Space Mono',monospace;font-size:.82rem;color:var(--muted);
    max-width:340px;line-height:1.55;word-break:break-word;
  }
  .breakdown .mod{color:var(--gold)}

  @keyframes pop{0%{transform:scale(.78);opacity:.4}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  .animate-pop{animation:pop .35s cubic-bezier(.2,1.3,.4,1)}

  /* mode + modifier row */
  .controls{display:flex;gap:10px;flex-wrap:wrap}
  .seg{display:flex;flex:1;background:var(--tray);border:1px solid var(--tray-edge);border-radius:13px;padding:4px;gap:3px;min-width:0}
  .seg button{
    flex:1;border:0;background:transparent;color:var(--muted);font-family:'Sora';font-weight:600;
    font-size:.78rem;padding:9px 4px;border-radius:9px;cursor:pointer;transition:.18s;white-space:nowrap;
  }
  .seg button.on{background:var(--indigo);color:#fff;box-shadow:0 4px 14px -6px rgba(108,92,181,.8)}
  .seg button.on.adv{background:var(--emerald);box-shadow:0 4px 14px -6px rgba(95,168,130,.8)}
  .seg button.on.dis{background:var(--crimson);box-shadow:0 4px 14px -6px rgba(200,65,59,.8)}

  .modbox{display:flex;align-items:center;background:var(--tray);border:1px solid var(--tray-edge);border-radius:13px;padding:4px}
  .modbox button{
    width:38px;height:38px;border:0;background:transparent;color:var(--bone);font-size:1.4rem;cursor:pointer;border-radius:9px;line-height:1;font-family:'Sora'
  }
  .modbox button:active{background:rgba(255,255,255,.06)}
  .modval{min-width:46px;text-align:center;font-family:'Space Mono';font-weight:700;font-size:1rem}
  .modval small{display:block;font-family:'Sora';font-weight:500;font-size:.56rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}

  /* dice grid */
  .dice{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .dice .die{grid-column:span 1}
  .die{
    position:relative;aspect-ratio:1;background:var(--tray);border:1px solid var(--tray-edge);
    border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .12s, border-color .2s, background .2s;
  }
  .die:active{transform:scale(.93)}
  .die.has{border-color:var(--gold);background:#28212f}
  .die svg{width:74%;height:74%;display:block}
  .die .poly{fill:none;stroke:var(--muted);stroke-width:5;transition:stroke .2s}
  .die.has .poly{stroke:var(--gold)}
  .die .lbl{fill:var(--bone);font-family:'Cinzel',serif;font-weight:700;font-size:26px}
  .die.has .lbl{fill:var(--gold-hi)}
  .die .count{
    position:absolute;top:-7px;right:-7px;min-width:24px;height:24px;padding:0 6px;
    background:var(--gold);color:#1b1410;border-radius:12px;font-family:'Space Mono';font-weight:700;
    font-size:.78rem;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 10px -3px rgba(0,0,0,.7);
  }
  .die .minus{
    position:absolute;bottom:-6px;right:-6px;width:22px;height:22px;border-radius:50%;
    background:var(--bg2);border:1px solid var(--tray-edge);color:var(--muted);font-size:.95rem;line-height:1;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
  }

  /* actions */
  .actions{display:flex;gap:10px}
  .roll{
    flex:1;border:0;border-radius:15px;cursor:pointer;
    background:linear-gradient(180deg,var(--gold-hi),var(--gold));
    color:#1c1308;font-family:'Cinzel',serif;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    font-size:1.05rem;padding:17px;box-shadow:0 14px 30px -12px rgba(212,162,78,.7);transition:transform .1s,filter .2s;
  }
  .roll:active{transform:translateY(2px) scale(.99)}
  .roll:disabled{filter:grayscale(.7) brightness(.6);box-shadow:none;cursor:default}
  .clear{
    border:1px solid var(--tray-edge);background:var(--tray);color:var(--muted);
    border-radius:15px;padding:0 20px;font-family:'Sora';font-weight:600;font-size:.85rem;cursor:pointer;
  }
  .clear:active{background:rgba(255,255,255,.05)}

  /* history */
  .hist{margin-top:4px}
  .hist h2{font-family:'Cinzel',serif;font-weight:600;font-size:.74rem;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
  .log{display:flex;flex-direction:column;gap:7px}
  .log-row{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    background:var(--bg2);border:1px solid #241f30;border-radius:11px;padding:10px 13px;font-size:.82rem;
  }
  .log-row .desc{font-family:'Space Mono';color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .log-row .res{font-family:'Cinzel';font-weight:700;font-size:1.05rem;color:var(--bone);flex-shrink:0}
  .log-row.c .res{color:var(--gold-hi)} .log-row.f .res{color:var(--crimson)}
  .empty-log{color:var(--muted);text-align:center;font-size:.8rem;opacity:.6;padding:6px}

  /* rolling dice tray */
  .tray{
    position:relative;width:100%;height:200px;overflow:hidden;border-radius:14px;
    background:radial-gradient(120% 100% at 50% 0%, rgba(255,255,255,.03), transparent 70%);
    box-shadow:inset 0 0 34px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.03);
  }
  .rolling{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;align-items:center;min-height:120px}
  .rdie{width:50px;height:50px}
  .tray .rdie{position:absolute;top:0;left:0;will-change:transform}
  .rdie svg{width:100%;height:100%;display:block;overflow:visible}
  .rdie .rpoly{fill:#231d2c;stroke:var(--gold);stroke-width:4;stroke-linejoin:round}
  .rdie .rface{fill:#332a41;stroke:var(--gold);stroke-width:2;stroke-linejoin:round}
  .rdie .fedge{stroke:var(--gold);stroke-width:1.4;opacity:.4}
  .rdie .rnum{fill:var(--bone);font-family:'Space Mono',monospace;font-weight:700}
  .rdie .rside{fill:var(--muted);font-family:'Space Mono',monospace;font-weight:700;opacity:.7}
  .tray .rdie.landed{transition:transform .34s cubic-bezier(.2,1.3,.45,1)}
  .rdie.nat20 .rpoly{stroke:var(--gold-hi);filter:drop-shadow(0 0 7px rgba(240,203,122,.7))}
  .rdie.nat20 .rface{fill:#4a3a18;stroke:var(--gold-hi)}
  .rdie.nat20 .rnum{fill:var(--gold-hi)}
  .rdie.nat1 .rpoly{stroke:var(--crimson)}
  .rdie.nat1 .rface{fill:#3a1715;stroke:var(--crimson)}
  .rdie.nat1 .rnum{fill:var(--crimson)}
  .reveal{margin-top:10px;opacity:0;transition:opacity .25s}
  .reveal.show{opacity:1}

  @media (prefers-reduced-motion: reduce){
    .animate-pop{animation:none}
    .reveal{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">TERNINGE<b>BAKKE</b></div>
    <div class="subtitle">Dungeons &amp; Dragons</div>
  </header>

  <div class="stage" id="stage">
    <div id="stageContent">
      <div class="stage-empty"><span class="glyph">⬢</span>Tryk på en terning for at samle dit kast</div>
    </div>
  </div>

  <div class="controls">
    <div class="seg" id="seg">
      <button data-mode="normal" class="on">Normal</button>
      <button data-mode="adv">Fordel</button>
      <button data-mode="dis">Ulempe</button>
    </div>
    <div class="modbox">
      <button id="modMinus">−</button>
      <div class="modval"><span id="modVal">+0</span><small>Mod</small></div>
      <button id="modPlus">+</button>
    </div>
  </div>

  <div class="dice" id="dice"></div>

  <div class="actions">
    <button class="roll" id="rollBtn" disabled>Kast</button>
    <button class="clear" id="clearBtn">Ryd</button>
  </div>

  <div class="hist">
    <h2>Historik</h2>
    <div class="log" id="log"><div class="empty-log">Ingen kast endnu</div></div>
  </div>
</div>

<script>
const DICE = [
  {s:4,  poly:"50,8 92,84 8,84"},
  {s:6,  rect:true},
  {s:8,  poly:"50,5 90,50 50,95 10,50"},
  {s:10, poly:"50,4 88,40 72,94 28,94 12,40"},
  {s:12, poly:"50,5 95,38 78,92 22,92 5,38"},
  {s:20, poly:"50,3 93,27 93,73 50,97 7,73 7,27"},
  {s:100,poly:"50,3 93,27 93,73 50,97 7,73 7,27", d100:true},
];

const state = { pool:{}, mod:0, mode:'normal', history:[] };
DICE.forEach(d=>state.pool[d.s]=0);
DICE.forEach(d=>{ if(d.poly) d.pts=d.poly.trim().split(/\s+/).map(p=>p.split(',').map(Number)); });
DICE.find(d=>d.s===6).pts=[[16,16],[84,16],[84,84],[16,84]];

const $ = s=>document.querySelector(s);
const diceEl=$('#dice'), stage=$('#stage'), stageContent=$('#stageContent'),
      rollBtn=$('#rollBtn'), modVal=$('#modVal'), logEl=$('#log');

function shapeSVG(d){
  const inner = d.rect
    ? `<rect class="poly" x="12" y="12" width="76" height="76" rx="14"/>`
    : `<polygon class="poly" points="${d.poly}"/>`;
  const label = d.d100 ? 'd100' : 'd'+d.s;
  const fs = d.d100 ? 18 : 26;
  return `<svg viewBox="0 0 100 100">${inner}<text class="lbl" x="50" y="50" text-anchor="middle" dominant-baseline="central" style="font-size:${fs}px">${label}</text></svg>`;
}

function miniShape(d){
  const V=d.pts, C=[50,50], t=0.46;
  const I=V.map(v=>[C[0]+t*(v[0]-C[0]), C[1]+t*(v[1]-C[1])]);
  const outer=V.map(p=>p.join(',')).join(' ');
  const inner=I.map(p=>p.join(',')).join(' ');
  const sfs=d.s>=20?8:9;
  let edges='', sides='';
  for(let i=0;i<V.length;i++){
    const j=(i+1)%V.length;
    edges+=`<line class="fedge" x1="${I[i][0].toFixed(1)}" y1="${I[i][1].toFixed(1)}" x2="${V[i][0]}" y2="${V[i][1]}"/>`;
    const cx=((V[i][0]+V[j][0]+I[j][0]+I[i][0])/4).toFixed(1);
    const cy=((V[i][1]+V[j][1]+I[j][1]+I[i][1])/4).toFixed(1);
    sides+=`<text class="rside" x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" style="font-size:${sfs}px">?</text>`;
  }
  const mfs=d.s>=100?15:22;
  return `<svg viewBox="0 0 100 100"><polygon class="rpoly" points="${outer}"/><polygon class="rface" points="${inner}"/>${edges}${sides}<text class="rnum" x="50" y="51" text-anchor="middle" dominant-baseline="central" style="font-size:${mfs}px">?</text></svg>`;
}

function renderDice(){
  diceEl.innerHTML='';
  DICE.forEach(d=>{
    const n=state.pool[d.s];
    const el=document.createElement('div');
    el.className='die'+(n>0?' has':'');
    el.innerHTML=shapeSVG(d)
      + (n>0?`<span class="count">${n}</span><span class="minus" data-minus="${d.s}">−</span>`:'');
    el.addEventListener('click',(e)=>{
      if(e.target.dataset.minus){ state.pool[d.s]=Math.max(0,n-1); }
      else { state.pool[d.s]=n+1; buzz(8); }
      renderDice(); updateRollBtn();
    });
    diceEl.appendChild(el);
  });
}

function updateRollBtn(){
  const has = DICE.some(d=>state.pool[d.s]>0);
  rollBtn.disabled=!has;
}

function buzz(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

// mode
document.querySelectorAll('#seg button').forEach(b=>{
  b.addEventListener('click',()=>{
    state.mode=b.dataset.mode;
    document.querySelectorAll('#seg button').forEach(x=>{x.className='';});
    b.className='on'+(b.dataset.mode==='adv'?' adv':b.dataset.mode==='dis'?' dis':'');
  });
});

// modifier
function renderMod(){ modVal.textContent=(state.mod>=0?'+':'')+state.mod; }
$('#modMinus').addEventListener('click',()=>{state.mod--;renderMod();});
$('#modPlus').addEventListener('click',()=>{state.mod++;renderMod();});

$('#clearBtn').addEventListener('click',()=>{
  state.rolling=false;
  if(state.raf){ cancelAnimationFrame(state.raf); state.raf=null; }
  DICE.forEach(d=>state.pool[d.s]=0); state.mod=0; renderMod();
  renderDice(); updateRollBtn();
  state.mode='normal';
  document.querySelectorAll('#seg button').forEach((x,i)=>x.className=i===0?'on':'');
  stage.className='stage';
  stageContent.innerHTML=`<div class="stage-empty"><span class="glyph">⬢</span>Tryk på en terning for at samle dit kast</div>`;
});

const r = s => Math.floor(Math.random()*s)+1;

rollBtn.addEventListener('click',roll);

function roll(){
  if(state.rolling) return;
  state.rolling=true; rollBtn.disabled=true;
  buzz([14,30,14]);

  const parts=[]; let total=0; let critish=null;
  const flat=[]; // individual dice for the tumble animation

  DICE.forEach(d=>{
    const n=state.pool[d.s]; if(!n) return;
    const rolls=[];
    for(let i=0;i<n;i++){
      if(d.s===20 && state.mode!=='normal'){
        const a=r(20), b=r(20);
        const pick = state.mode==='adv'?Math.max(a,b):Math.min(a,b);
        rolls.push({v:pick, pair:[a,b]}); total+=pick;
        flat.push({d, val:pick});
      } else {
        const v=r(d.s); rolls.push({v}); total+=v;
        flat.push({d, val:v});
      }
    }
    parts.push({d, rolls});
  });

  total+=state.mod;

  const d20part=parts.find(p=>p.d.s===20);
  const totalDice=parts.reduce((a,p)=>a+p.rolls.length,0);
  if(d20part && totalDice===1){
    if(d20part.rolls[0].v===20) critish='crit';
    else if(d20part.rolls[0].v===1) critish='fumble';
  }

  const segs=parts.map(p=>{
    const label = p.d.d100?'d100':'d'+p.d.s;
    const vals = p.rolls.map(rr=>{
      if(rr.pair){
        const kept=rr.v, dropped=rr.pair[0]===kept?rr.pair[1]:rr.pair[0];
        return `${kept}/${dropped}`;
      }
      return rr.v;
    }).join('+');
    return `${p.rolls.length}${label}: ${vals}`;
  });
  let breakdown=segs.join('   ');
  if(state.mod!==0) breakdown+=`   <span class="mod">${state.mod>0?'+':''}${state.mod}</span>`;

  let verdict='', vClass='', sClass='stage';
  if(critish==='crit'){verdict='Kritisk træf!';vClass='crit';sClass='stage crit';}
  else if(critish==='fumble'){verdict='Kritisk fejl!';vClass='fumble';sClass='stage fumble';}

  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(state.raf) cancelAnimationFrame(state.raf);
  stage.className='stage';

  const reveal=()=>{
    if(state.raf){ cancelAnimationFrame(state.raf); state.raf=null; }
    const slot=document.getElementById('reveal');
    if(!slot){ state.rolling=false; updateRollBtn(); return; }
    stage.className=sClass;
    slot.innerHTML=`
      <div class="verdict ${vClass}">${verdict||'&nbsp;'}</div>
      <div class="total animate-pop">${total}</div>
      <div class="breakdown">${breakdown}</div>`;
    slot.classList.add('show');
    if(critish==='crit') buzz([20,40,20,40,60]);
    else if(critish==='fumble') buzz([80,40,80]);

    const dicePart = parts.map(p=>`${p.rolls.length}${p.d.d100?'d100':'d'+p.d.s}`).join('+');
    const modPart = state.mod!==0?`${state.mod>0?'+':''}${state.mod}`:'';
    const modeTag = state.mode==='adv'?' ▲':state.mode==='dis'?' ▼':'';
    state.history.unshift({desc:dicePart+modPart+modeTag, res:total, cls:critish});
    if(state.history.length>8) state.history.pop();
    renderLog();
    state.rolling=false; updateRollBtn();
  };

  const diceHTML = flat.map((f,i)=>`<div class="rdie" data-i="${i}">${miniShape(f.d)}</div>`).join('');

  // reduced motion: tidy row, no physics
  if(reduce){
    stageContent.innerHTML=`<div class="rolling">${diceHTML}</div><div class="reveal" id="reveal"></div>`;
    flat.forEach((f,i)=>{
      const el=stageContent.querySelector(`.rdie[data-i="${i}"]`);
      el.querySelector('.rnum').textContent=f.val;
      el.querySelectorAll('.rside').forEach(s=>s.textContent=r(f.d.s));
      if(f.d.s===20&&f.val===20)el.classList.add('nat20');
      if(f.d.s===20&&f.val===1)el.classList.add('nat1');
    });
    reveal(); return;
  }

  // physics dice tray — dice bounce off walls and each other, then settle
  stageContent.innerHTML=`<div class="tray" id="tray">${diceHTML}</div><div class="reveal" id="reveal"></div>`;
  const tray=document.getElementById('tray');
  const W=tray.clientWidth||320, H=tray.clientHeight||200, D=50, R=D/2;

  const bodies=flat.map((f,i)=>{
    const el=tray.querySelector(`.rdie[data-i="${i}"]`);
    const ang=Math.random()*Math.PI*2, speed=8+Math.random()*5;
    return {
      el, f,
      x:R+Math.random()*Math.max(1,W-D),
      y:R+Math.random()*Math.max(1,H-D),
      vx:Math.cos(ang)*speed, vy:Math.sin(ang)*speed,
      rot:Math.random()*360, vr:(Math.random()*2-1)*26,
    };
  });
  const draw=b=>{ b.el.style.transform=`translate(${b.x-R}px,${b.y-R}px) rotate(${b.rot}deg)`; };
  bodies.forEach(draw);

  const REST=0.78, FRIC=0.99;
  let frame=0;
  function step(){
    frame++;
    for(const b of bodies){
      b.x+=b.vx; b.y+=b.vy; b.rot+=b.vr;
      if(b.x<R){b.x=R;b.vx=-b.vx*REST;b.vr*=0.85;}
      else if(b.x>W-R){b.x=W-R;b.vx=-b.vx*REST;b.vr*=0.85;}
      if(b.y<R){b.y=R;b.vy=-b.vy*REST;b.vr*=0.85;}
      else if(b.y>H-R){b.y=H-R;b.vy=-b.vy*REST;b.vr*=0.85;}
      b.vx*=FRIC; b.vy*=FRIC; b.vr*=FRIC;
    }
    // die-on-die collisions (circle approximation)
    for(let i=0;i<bodies.length;i++)for(let j=i+1;j<bodies.length;j++){
      const a=bodies[i],c=bodies[j];
      const dx=c.x-a.x, dy=c.y-a.y, dist=Math.hypot(dx,dy)||0.01;
      if(dist<D){
        const nx=dx/dist, ny=dy/dist, ov=(D-dist)/2;
        a.x-=nx*ov; a.y-=ny*ov; c.x+=nx*ov; c.y+=ny*ov;
        const vn=(c.vx-a.vx)*nx+(c.vy-a.vy)*ny;
        if(vn<0){ const imp=-vn*REST; a.vx-=nx*imp; a.vy-=ny*imp; c.vx+=nx*imp; c.vy+=ny*imp; }
      }
    }
    if(frame%3===0){
      for(const b of bodies){
        b.el.querySelector('.rnum').textContent=r(b.f.d.s);
        if(frame%9===0) b.el.querySelectorAll('.rside').forEach(s=>s.textContent=r(b.f.d.s));
      }
    }
    for(const b of bodies) draw(b);
    if(frame<74){ state.raf=requestAnimationFrame(step); }
    else { settleAll(); }
  }

  function settleAll(){
    state.raf=null;
    bodies.forEach(b=>{
      const upright=Math.round(b.rot/360)*360; // land number-up, readable
      b.el.classList.add('landed');
      b.el.style.transform=`translate(${b.x-R}px,${b.y-R}px) rotate(${upright}deg)`;
      b.el.querySelector('.rnum').textContent=b.f.val;
      b.el.querySelectorAll('.rside').forEach(s=>s.textContent=r(b.f.d.s));
      if(b.f.d.s===20&&b.f.val===20)b.el.classList.add('nat20');
      if(b.f.d.s===20&&b.f.val===1)b.el.classList.add('nat1');
    });
    buzz(12);
    setTimeout(reveal, 360);
  }

  state.raf=requestAnimationFrame(step);
}

function renderLog(){
  if(!state.history.length){ logEl.innerHTML='<div class="empty-log">Ingen kast endnu</div>'; return; }
  logEl.innerHTML=state.history.map(h=>
    `<div class="log-row ${h.cls==='crit'?'c':h.cls==='fumble'?'f':''}">
       <span class="desc">${h.desc}</span><span class="res">${h.res}</span>
     </div>`).join('');
}

renderDice(); renderMod(); updateRollBtn();
</script>
